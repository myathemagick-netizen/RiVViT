<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiVViT — Earth Pillar Network</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:'Courier New',monospace; overflow:hidden; }
canvas { display:block; }
#ui { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; }
#header { position:absolute; top:18px; left:50%; transform:translateX(-50%); text-align:center; }
#header h1 { font-size:12px; letter-spacing:6px; color:#c8a96e; text-transform:uppercase; }
#header p  { font-size:9px; letter-spacing:3px; color:#3a3a3a; margin-top:3px; }
#layers { position:absolute; top:18px; left:18px; pointer-events:all; display:flex; flex-direction:column; gap:7px; }
.lbtn {
  background:rgba(0,0,0,0.82); border:1px solid #2a2a2a; color:#555;
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px;
  padding:6px 11px; cursor:pointer; text-transform:uppercase;
  transition:all 0.18s; display:flex; align-items:center; gap:7px;
}
.lbtn.on  { border-color:#c8a96e; color:#c8a96e; }
.lbtn:hover { border-color:#444; color:#999; }
.lbtn .d  { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
#legend {
  position:absolute; top:18px; right:18px; pointer-events:none;
  display:flex; flex-direction:column; gap:6px;
}
.leg { display:flex; align-items:center; gap:8px; font-size:9px; letter-spacing:2px; color:#444; text-transform:uppercase; }
.lg-c { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.lg-d { width:8px; height:8px; flex-shrink:0; transform:rotate(45deg); }
#info {
  position:absolute; right:18px; top:50%; transform:translateY(-50%);
  width:255px; background:rgba(0,0,0,0.92); border:1px solid #c8a96e22;
  padding:18px; pointer-events:all; display:none;
}
#info.on { display:block; }
#info h2  { font-size:10px; letter-spacing:3px; color:#c8a96e; text-transform:uppercase; margin-bottom:3px; }
#info .sub { font-size:8px; color:#3a3a3a; letter-spacing:2px; margin-bottom:12px; text-transform:uppercase; }
#info .tag { font-size:8px; letter-spacing:1px; padding:3px 7px; margin-bottom:10px; display:inline-block; }
#info .tag.vortex    { background:#0a2a1a; color:#50c890; border:1px solid #50c89033; }
#info .tag.secondary { background:#1a1a0a; color:#c8a96e; border:1px solid #c8a96e33; }
#info p   { font-size:10px; color:#777; line-height:1.65; }
#info .coords { font-size:8px; color:#2a2a2a; letter-spacing:1px; border-top:1px solid #111; padding-top:9px; margin-top:10px; }
.xbtn { position:absolute; top:9px; right:11px; background:none; border:none; color:#2a2a2a; font-size:17px; cursor:pointer; font-family:inherit; }
.xbtn:hover { color:#c8a96e; }
#ann-panel { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:none; pointer-events:all; }
#ann-panel.on { display:flex; gap:7px; align-items:center; }
#ann-in { background:rgba(0,0,0,0.88); border:1px solid #c8a96e44; color:#c8a96e; font-family:'Courier New',monospace; font-size:11px; padding:7px 13px; width:280px; outline:none; }
#ann-in::placeholder { color:#2a2a2a; }
.abtn { background:#c8a96e11; border:1px solid #c8a96e44; color:#c8a96e; font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px; padding:7px 13px; cursor:pointer; text-transform:uppercase; }
.acnc { background:none; border:1px solid #222; color:#333; font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px; padding:7px 13px; cursor:pointer; text-transform:uppercase; }
#hint { position:absolute; bottom:18px; right:18px; font-size:8px; color:#1a1a1a; letter-spacing:1px; line-height:2.1; text-align:right; }
#vrbtn { position:absolute; bottom:18px; left:18px; background:rgba(0,0,0,0.82); border:1px solid #c8a96e33; color:#c8a96e55; font-family:'Courier New',monospace; font-size:9px; letter-spacing:3px; padding:9px 16px; cursor:pointer; text-transform:uppercase; pointer-events:all; }
#vrbtn:hover { background:#c8a96e0a; border-color:#c8a96e88; color:#c8a96e; }
#modeind { position:absolute; top:52px; left:50%; transform:translateX(-50%); font-size:8px; color:#222; letter-spacing:3px; text-transform:uppercase; }
#modeind.on { color:#c8a96e; }
.xhair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:14px; height:14px; display:none; }
.xhair::before,.xhair::after { content:''; position:absolute; background:#c8a96e66; }
.xhair::before { width:1px; height:100%; left:50%; transform:translateX(-50%); }
.xhair::after  { height:1px; width:100%; top:50%; transform:translateY(-50%); }
.xhair.on { display:block; }
#loading { position:fixed; top:0; left:0; right:0; bottom:0; background:#000206; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:100; transition:opacity 1s; }
#loading p { font-size:10px; letter-spacing:4px; color:#c8a96e33; text-transform:uppercase; }
#loadbar { width:200px; height:1px; background:#111; }
#loadfill { height:100%; background:#c8a96e44; width:0%; transition:width .3s; }
</style>
</head>
<body>

<div id="loading">
  <p>Rendering Earth…</p>
  <div id="loadbar"><div id="loadfill"></div></div>
</div>

<div id="ui">
  <div id="header"><h1>RiVViT</h1><p>Myathe Magick — Icosahedral Chronon Geometry</p></div>

  <div id="layers">
    <button class="lbtn on" data-l="globe"><span class="d"></span>Globe / Map</button>

  <div id="legend">
    <div class="leg"><div class="lg-c" style="background:#50c890;box-shadow:0 0 6px #50c890;"></div>Vortex / Earth Pillar</div>

  <div id="hint">DRAG — rotate<br>SCROLL — zoom<br>CLICK — select<br>VR — headset</div>
  <button id="vrbtn">⬡ Enter VR</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══════════════════════════════════════════════════════════════════════════
// VORTEX NODES — Sanderson's 12 vile vortices, the true icosahedron vertices
// All rendered identically (green). No type distinction needed.
// ═══════════════════════════════════════════════════════════════════════════
const VORTEX_NODES = [
  { id:0,  name:"Bermuda Triangle",        region:"North Atlantic",          lat: 25,  lon: -71,
    desc:"Electromagnetic anomalies, compass malfunctions, disappearances. Near potential Atlantean remnants including the Bimini Road. One of eight Belialian anchor points — chronon node inverted by the MerKaBa catastrophe." },

  { id:2,  name:"South Atlantic Vortex",   region:"Brazil / South Atlantic", lat:-19,  lon: -32,

  { id:4,  name:"Wharton Basin",           region:"Indian Ocean — SW Aus.",  lat:-25,  lon: 100,

  { id:5,  name:"Loyalty Islands",         region:"SW Pacific — E. Aus.",    lat:-22,  lon: 167,

  { id:6,  name:"Easter Island / Rapa Nui",region:"Southeast Pacific",       lat:-27,  lon:-109,
    desc:"Site of the Moai statues. Potentially a non-anchor node retaining more of its original Earth Pillar character. The Moai facing inward around the island perimeter may constitute a resonance-focusing array." },
  { id:7,  name:"Algerian Vortex",         region:"North Africa",            lat: 26,  lon:   3,
    desc:"Adjacent to Tassili n'Ajjer cave paintings including mushroom shaman figures — cultures using psychedelic gnosis at a location of natural chronon thinness. The Giza riftline to the Indus Valley node runs through here." },
  { id:8,  name:"Indus Valley Vortex",     region:"Pakistan / NW India",     lat: 27,  lon:  68,
    desc:"Near Mohenjo-daro. The Indus Valley civilisation's unusual features — sophisticated urban planning, apparent absence of warrior class, emphasis on water flow — may reflect proximity to a less-corrupted Earth Pillar." },
  { id:9,  name:"Hawaiian Vortex",         region:"Central Pacific",         lat: 20,  lon:-155,
    desc:"Northern Pacific icosahedral vertex. The volcanic hotspot geology — a permanent plume of deep mantle material — may reflect the deep chronon focusing of this node expressed geologically." },
  { id:10, name:"North Pole Vortex",       region:"Arctic Ocean",            lat: 72,  lon: -96,
    desc:"Northern polar Earth Pillar. Sanderson's geometry places one icosahedral vertex in the Arctic region. The geographic and magnetic pole's proximity may reflect the deep chronon structure of this node." },
  { id:11, name:"Antarctic Node",          region:"East Antarctica",         lat:-72,  lon: 145,
    desc:"Southern polar Earth Pillar. Geometric necessity of the icosahedron places vertices in polar regions. The ice sheet's electromagnetic isolation may preserve more of the original pillar character here than anywhere on Earth." },
];

// Icosahedral edges — correct 30 edges based on Sanderson's belt layout
// North pole(10) + upper belt [9,0,7,8,1] + lower belt [6,2,3,4,5] + South pole(11)
const EDGES = [
  // North pole to upper belt (5)
  [0,10],[1,10],[7,10],[8,10],[9,10],
  // Upper belt ring (5)
  [9,0],[0,7],[7,8],[8,1],[1,9],
  // Upper to lower cross-connections (10)
  [9,6],[9,5],
  [0,6],[0,2],
  [7,2],[7,3],
  [8,3],[8,4],
  [1,4],[1,5],
  // Lower belt ring (5)
  [6,2],[2,3],[3,4],[4,5],[5,6],
  // South pole to lower belt (5)
  [2,11],[3,11],[4,11],[5,11],[6,11],
];

// ═══════════════════════════════════════════════════════════════════════════
// SECONDARY NODES — sacred sites along riftlines
// ═══════════════════════════════════════════════════════════════════════════
const SECONDARY_NODES = [
  { name:"Giza / Great Pyramid",  region:"Egypt",          lat: 29.9, lon:  31.1,
    desc:"Positioned on the riftline between the Algerian vortex and the Indus Valley node — on the natural icosahedral edge between two Earth Pillars. The pyramidal shape amplifies existing chronon flow. The King's Chamber sits at the precise point of maximum energy concentration within the focusing geometry." },
  { name:"Stonehenge",            region:"England",         lat: 51.2, lon:  -1.8,
    desc:"Stone circle — a distributed tine array in a closed curve. Each standing stone focuses and discharges upward. The circular arrangement creates a standing-wave resonance field. Stonehenge produces measurable acoustic standing waves at frequencies associated with altered states of consciousness." },
  { name:"Teotihuacan",           region:"Mexico",          lat: 19.7, lon: -98.8,
    desc:"Pyramid complex on the North American riftline corridor. The Avenue of the Dead aligns with astronomical events marking the Novelty Wave. Pyramidal focusing geometry amplifying existing chronon flow at a riftline-adjacent location." },
  { name:"Machu Picchu",          region:"Peru",            lat:-13.2, lon: -72.5,
    desc:"Inca sacred site on the Andean riftline corridor between Easter Island and the South Atlantic vortex. Positioned at high altitude where the atmosphere is thinner and chronon permeability is naturally higher." },
  { name:"Angkor Wat",            region:"Cambodia",        lat: 13.4, lon: 103.9,
    desc:"Temple complex on the riftline between the Wharton Basin and the Indus Valley nodes. The layout mirrors the Pleiades star cluster — encoding celestial chronon geometry in stone at a location of existing riftline flow." },
  { name:"Uluru / Ayers Rock",    region:"Central Aus.",    lat:-25.3, lon: 131.0,
    desc:"Sacred site at the convergence of multiple Aboriginal songline paths between the Wharton Basin and Loyalty Islands nodes — a living riftline maintenance practice 65,000 years old." },
  { name:"Tassili n'Ajjer",       region:"Algeria",         lat: 25.5, lon:   8.3,
    desc:"Cave paintings including mushroom shaman figures — one of the earliest records of psychedelic gnosis induction at a location of natural chronon thinness adjacent to the Algerian vortex node." },
  { name:"Göbekli Tepe",          region:"Turkey",          lat: 37.2, lon:  38.9,
    desc:"Oldest known monumental architecture (11,000 BCE). The circular enclosures with T-shaped pillars constitute an early distributed tine array — chronon-focusing architecture predating the catastrophe's cultural effects." },
  { name:"Mt. Kailash",           region:"Tibet",           lat: 31.1, lon:  81.3,
    desc:"Centre of the Shamanic Spine riftline corridor (Edge 3). Called the 'centre of the world' by multiple traditions — one of many such designations that cluster along active riftline corridors. Roerich's Central Asian expedition traversed this corridor seeking Shambhala. A significant secondary node, not a primary icosahedron vertex." },
  { name:"Chichen Itza",          region:"Mexico / Yucatan",lat: 20.7, lon: -88.6,
    desc:"Mayan ceremonial centre on the riftline corridor between the Bermuda Triangle node and the Hawaiian vortex. The El Castillo pyramid's shadow-serpent effect at equinox encodes chronon tidal timing in architectural geometry." },
  { name:"Easter Island Moai",    region:"SE Pacific",      lat:-27.1, lon:-109.4,
    desc:"The Moai statues positioned around Rapa Nui's perimeter facing inward — a resonance array focusing chronon energy toward the vortex node's centre. Each Moai is a standing tine; the island's circular arrangement creates the same resonance geometry as a stone circle." },
];

// ═══════════════════════════════════════════════════════════════════════════
// RENDERER & SCENE
// ═══════════════════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000206);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.01,500);
camera.position.z = 3.2;

// Stars
(()=>{
  const pts=[];
  for(let i=0;i<4000;i++){
    const v=new THREE.Vector3((Math.random()-.5)*300,(Math.random()-.5)*300,(Math.random()-.5)*300);
    if(v.length()>25) pts.push(v.x,v.y,v.z);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.13,transparent:true,opacity:.4})));
})();

scene.add(new THREE.AmbientLight(0x223355,1.4));
const sunL=new THREE.DirectionalLight(0xfff8e8,1.1);
sunL.position.set(6,3,5); scene.add(sunL);
const fillL=new THREE.DirectionalLight(0x334466,.35);
fillL.position.set(-4,-2,-4); scene.add(fillL);

const G = new THREE.Group(); scene.add(G);
const R = 1.0;

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function ll2v(lat,lon,r){
  r=(r===undefined)?R:r;
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(theta)
  );
}

function surfaceArc(va,vb,segs,r){
  segs=segs||60; r=r||R;
  const pts=[];
  for(let i=0;i<=segs;i++)
    pts.push(new THREE.Vector3().lerpVectors(va,vb,i/segs).normalize().multiplyScalar(r));
  return pts;
}

const VV = VORTEX_NODES.map(n=>ll2v(n.lat,n.lon,R));       // on surface
const IV = VORTEX_NODES.map(n=>ll2v(n.lat,n.lon,R*0.955)); // inside

// ═══════════════════════════════════════════════════════════════════════════
// GLOBE
// ═══════════════════════════════════════════════════════════════════════════
const globeGrp = new THREE.Group(); G.add(globeGrp);

const globeGeo = new THREE.SphereGeometry(R,72,72);
const globeMat = new THREE.MeshPhongMaterial({ transparent:true, opacity:0.75, shininess:10 });
const globeMesh = new THREE.Mesh(globeGeo, globeMat);
globeGrp.add(globeMesh);

// Atmosphere
globeGrp.add(new THREE.Mesh(
  new THREE.SphereGeometry(R*1.045,32,32),
  new THREE.MeshPhongMaterial({color:0x2255aa,transparent:true,opacity:.055,side:THREE.BackSide})
));

// Graticule
(()=>{
  const mat=new THREE.LineBasicMaterial({color:0x0d1f30,transparent:true,opacity:.45});
  const r=R*1.002;
  for(let lat=-80;lat<=80;lat+=20){
    const pts=[];
    for(let lon=0;lon<=360;lon+=4){
      const ph=(90-lat)*Math.PI/180,th=lon*Math.PI/180;
      pts.push(new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th)));
    }
    globeGrp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
  }
  for(let lon=0;lon<360;lon+=20){
    const pts=[];
    for(let lat=-90;lat<=90;lat+=3){
      const ph=(90-lat)*Math.PI/180,th=lon*Math.PI/180;
      pts.push(new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th)));
    }
    globeGrp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat));
  }
})();

// Load Earth texture via fetch→blob (bypasses WebGL CORS restriction)
const texLoader = new THREE.TextureLoader();
const fillEl = document.getElementById('loadfill');

const TEX_URLS = [
  'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_atmos_2048.jpg',
  'https://unpkg.com/three@0.128.0/examples/textures/planets/earth_atmos_2048.jpg',
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg',
  'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg',
];

function hideLoading(){
  const el=document.getElementById('loading');
  if(el){ el.style.opacity='0'; setTimeout(()=>el.style.display='none',1000); }
}

function applyTexture(tex){
  globeMat.map = tex;
  globeMat.needsUpdate = true;
  if(fillEl) fillEl.style.width='100%';
  setTimeout(hideLoading, 300);
}

function tryFetchTexture(urls){
  if(!urls.length){ makeProcedural(); hideLoading(); return; }
  const [url, ...rest] = urls;
  fetch(url)
    .then(r => { if(!r.ok) throw new Error(r.status); return r.blob(); })
    .then(blob => {
      const objURL = URL.createObjectURL(blob);
      texLoader.load(objURL, tex => {
        URL.revokeObjectURL(objURL);
        applyTexture(tex);
      }, undefined, () => tryFetchTexture(rest));
    })
    .catch(() => tryFetchTexture(rest));
}

tryFetchTexture(TEX_URLS);

// ── Procedural fallback — much more detailed ──────────────────────────────
function makeProcedural(){
  const W=4096, H=2048;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // Deep ocean gradient
  const og=ctx.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#020d1a');
  og.addColorStop(0.5,'#051828');
  og.addColorStop(1,'#020d1a');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);

  // Ocean noise — subtle variation
  for(let i=0;i<8000;i++){
    const x=Math.random()*W, y=Math.random()*H;
    const r=Math.random()*3;
    ctx.fillStyle=`rgba(${10+Math.random()*15},${30+Math.random()*25},${55+Math.random()*30},0.08)`;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }

  // Convert lat/lon to canvas coords
  function px(lat,lon){ return [(lon+180)/360*W, (90-lat)/180*H]; }

  // Land base color with gradient
  function landGrad(lat){
    // Polar white, tropical green-grey, mid brown-grey
    const al=Math.abs(lat);
    if(al>65) return '#c8d4d8';
    if(al>50) return '#4a5a4a';
    if(al>30) return '#3a4e3a';
    return '#2e4430';
  }

  function drawLand(coords, lat_approx){
    ctx.fillStyle = landGrad(lat_approx);
    ctx.strokeStyle = '#1a2e22';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const [x0,y0]=px(coords[0][0],coords[0][1]); ctx.moveTo(x0,y0);
    for(let i=1;i<coords.length;i++){
      const [x,y]=px(coords[i][0],coords[i][1]); ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // ── North America ──
  drawLand([
    [71,-141],[70,-130],[68,-136],[65,-138],[60,-137],[58,-136],

// FACES
// ═══════════════════════════════════════════════════════════════════════════
const facesGrp = new THREE.Group(); G.add(facesGrp);
(()=>{
  const found=new Set();
  EDGES.forEach(([a1,a2],i)=>{
    EDGES.forEach(([b1,b2],j)=>{
      if(j<=i) return;
      let sh=-1,va=-1,vb=-1;
      if(a1===b1){sh=a1;va=a2;vb=b2;} else if(a1===b2){sh=a1;va=a2;vb=b1;}
      else if(a2===b1){sh=a2;va=a1;vb=b2;} else if(a2===b2){sh=a2;va=a1;vb=b1;}
      if(sh<0) return;
      if(!EDGES.some(([e1,e2])=>(e1===va&&e2===vb)||(e1===vb&&e2===va))) return;
      const key=[sh,va,vb].sort((a,b)=>a-b).join('-');
      if(found.has(key)) return; found.add(key);
      const p0=IV[sh],p1=IV[va],p2=IV[vb];
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.Float32BufferAttribute([p0.x,p0.y,p0.z,p1.x,p1.y,p1.z,p2.x,p2.y,p2.z],3));
      facesGrp.add(new THREE.Mesh(geo,new THREE.MeshBasicMaterial({
        color:new THREE.Color().setHSL((found.size*41%360)/360,.4,.09),
        transparent:true,opacity:.15,side:THREE.DoubleSide,depthWrite:false
      })));
    });
  });
})();

// ═══════════════════════════════════════════════════════════════════════════
// VORTEX NODES — all green, uniform appearance
// ═══════════════════════════════════════════════════════════════════════════
const vortexGrp = new THREE.Group(); G.add(vortexGrp);
const vortexAnim=[], vortexDots=[];
const VCOL=0x50c890, VCOLB=0x80ffcc;

VORTEX_NODES.forEach((node,i)=>{
  const sp=VV[i].clone();
  const nrm=sp.clone().normalize();

  const ringMat=new THREE.MeshBasicMaterial({color:VCOL,transparent:true,opacity:.7,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(new THREE.RingGeometry(.022,.036,24),ringMat);
  ring.position.copy(sp);
  ring.lookAt(sp.clone().multiplyScalar(3));
  vortexGrp.add(ring);

  const dotMat=new THREE.MeshBasicMaterial({color:VCOLB});
  const dot=new THREE.Mesh(new THREE.SphereGeometry(.016,12,12),dotMat);
  dot.position.copy(sp.clone().multiplyScalar(1.013));
  dot.userData={nodeId:i,nodeSet:'vortex'};
  vortexGrp.add(dot);
  vortexDots.push(dot);

  const pulseMat=new THREE.MeshBasicMaterial({color:VCOL,transparent:true,opacity:0,wireframe:true});
  const pulse=new THREE.Mesh(new THREE.SphereGeometry(.046,14,14),pulseMat);
  pulse.position.copy(sp.clone().multiplyScalar(1.013));
  vortexGrp.add(pulse);

  const tip=sp.clone().add(nrm.clone().multiplyScalar(.07));
  vortexGrp.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([sp,tip]),
    new THREE.LineBasicMaterial({color:VCOL,transparent:true,opacity:.55})
  ));

  // Connector to interior vertex
  vortexGrp.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([sp,IV[i]]),
    new THREE.LineBasicMaterial({color:0x1a3020,transparent:true,opacity:.5})
  ));

  vortexAnim.push({ring,ringMat,pulse,pulseMat,phase:Math.random()*Math.PI*2});
});

  document.getElementById('ip-name').textContent=node.name;

  const tag=document.getElementById('ip-tag');

// ═══════════════════════════════════════════════════════════════════════════
let dragging=false,prevM={x:0,y:0},rotV={x:0,y:0},targetZ=3.2;
const ray=new THREE.Raycaster(), mp=new THREE.Vector2();

function doClick(cx,cy){
  mp.x=(cx/window.innerWidth)*2-1; mp.y=-(cy/window.innerHeight)*2+1;
  ray.setFromCamera(mp,camera);
  if(annMode){
    const h=ray.intersectObject(hitSphere);
    if(h.length){
      const local=G.worldToLocal(h[0].point.clone());
      const lat=90-Math.acos(Math.max(-1,Math.min(1,local.y/R)))*180/Math.PI;
      const lon=Math.atan2(local.z,-local.x)*180/Math.PI-180;
      pendingPos={lat:Math.round(lat*10)/10,lon:Math.round(lon*10)/10};
      document.getElementById('ann-panel').classList.add('on');
      document.getElementById('ann-in').focus();
    }
    return;
  }
  const vh=ray.intersectObjects(vortexDots);
  if(vh.length){showInfo(VORTEX_NODES[vh[0].object.userData.nodeId],'vortex');return;}
  const sh=ray.intersectObjects(secondaryDots);
  if(sh.length){showInfo(SECONDARY_NODES[sh[0].object.userData.nodeId],'secondary');return;}
  const ah=ray.intersectObjects(annGrp.children);
  if(ah.length&&ah[0].object.userData.annotation)
    showInfo({name:'Annotation',region:'User-placed',lat:undefined,desc:ah[0].object.userData.text},'annotation');
}

renderer.domElement.addEventListener('mousedown',e=>{
  dragging=false; prevM={x:e.clientX,y:e.clientY};
  const mv=ev=>{ const dx=ev.clientX-prevM.x,dy=ev.clientY-prevM.y; if(Math.abs(dx)>2||Math.abs(dy)>2)dragging=true; rotV.y+=dx*.007;rotV.x+=dy*.007;prevM={x:ev.clientX,y:ev.clientY}; };
  const mu=ev=>{ window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',mu);if(!dragging)doClick(ev.clientX,ev.clientY); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',mu);
});
renderer.domElement.addEventListener('wheel',e=>{targetZ=Math.max(1.5,Math.min(6,targetZ+e.deltaY*.003));},{passive:true});
let lt=null;
renderer.domElement.addEventListener('touchstart',e=>{lt={x:e.touches[0].clientX,y:e.touches[0].clientY};dragging=false;},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{if(!lt)return;const dx=e.touches[0].clientX-lt.x,dy=e.touches[0].clientY-lt.y;if(Math.abs(dx)>2||Math.abs(dy)>2)dragging=true;rotV.y+=dx*.01;rotV.x+=dy*.01;lt={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
renderer.domElement.addEventListener('touchend',e=>{if(!dragging)doClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);lt=null;});

  renderer.xr.setSession(xrSess);
  setVrStatus('⬡ Exit VR', '#80ffcc');

  // Position globe comfortably in front of user in VR
  // ~1.3m height, 2.2m forward, scaled down to 0.68m radius
  G.position.set(0, 1.3, -2.2);
  G.scale.setScalar(0.68);

  xrSess.addEventListener('end', ()=>{
    xrSess = null;
    setVrStatus('⬡ Enter VR', '#c8a96e');
    G.position.set(0, 0, 0);
    G.scale.setScalar(1);
  });
});

// ═══════════════════════════════════════════════════════════════════════════
// VR CONTROLLERS
// ═══════════════════════════════════════════════════════════════════════════

// Controller groups — one per hand
const controllers = [0, 1].map(i => {
  const ctrl = renderer.xr.getController(i);
  scene.add(ctrl);

  // Laser pointer ray
  const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -8)
  ]);
  const rayMat = new THREE.LineBasicMaterial({ color: 0x80ffcc, transparent: true, opacity: 0.4 });
  const ray = new THREE.Line(rayGeo, rayMat);
  ctrl.add(ray);

  // Cursor dot at ray tip (moves to hit point)
  const cursorGeo = new THREE.SphereGeometry(0.008, 8, 8);
  const cursorMat = new THREE.MeshBasicMaterial({ color: 0xc8a96e, transparent: true, opacity: 0.9 });
  const cursor = new THREE.Mesh(cursorGeo, cursorMat);
  cursor.visible = false;
  scene.add(cursor);

  // Simple controller body (small box)
  const bodyGeo = new THREE.BoxGeometry(0.04, 0.04, 0.1);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 40 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, 0, -0.04);
  ctrl.add(body);

  return { ctrl, ray, rayMat, cursor, cursorMat, hand: i };
});

// Grip sources for thumbstick input
const gripSources = [null, null];
renderer.xr.addEventListener('sessionstart', () => {
  const session = renderer.xr.getSession();
  session.addEventListener('inputsourceschange', e => {
    e.added.forEach(src => {
      if (src.handedness === 'left')  gripSources[0] = src;
      if (src.handedness === 'right') gripSources[1] = src;
    });
    e.removed.forEach(src => {
      if (src === gripSources[0]) gripSources[0] = null;
      if (src === gripSources[1]) gripSources[1] = null;
    });
  });
});

// Trigger select — fire raycaster from controller
const vrRay = new THREE.Raycaster();
let lastSelectTime = 0;

controllers.forEach(({ ctrl }) => {
  ctrl.addEventListener('selectstart', () => {
    const now = performance.now();
    if (now - lastSelectTime < 300) return; // debounce
    lastSelectTime = now;

    // Build ray from controller world position/direction
    const origin    = new THREE.Vector3();
    const direction = new THREE.Vector3();
    ctrl.getWorldPosition(origin);
    ctrl.getWorldDirection(direction).negate();

    vrRay.set(origin, direction);

    // Check vortex nodes
    const vh = vrRay.intersectObjects(vortexDots);
    if (vh.length) {
      showInfo(VORTEX_NODES[vh[0].object.userData.nodeId], 'vortex');
      return;
    }
    // Check secondary nodes
    const sh = vrRay.intersectObjects(secondaryDots);
    if (sh.length) {
      showInfo(SECONDARY_NODES[sh[0].object.userData.nodeId], 'secondary');
      return;
    }
    // Check annotations
    const ah = vrRay.intersectObjects(annGrp.children);
    if (ah.length && ah[0].object.userData.annotation) {
      showInfo({ name:'Annotation', region:'User-placed', lat:undefined, desc:ah[0].object.userData.text }, 'annotation');
    }
  });
});

// VR info panel — a 3D billboard that appears in world space
const vrInfoCanvas = document.createElement('canvas');
vrInfoCanvas.width = 512; vrInfoCanvas.height = 256;
const vrInfoCtx = vrInfoCanvas.getContext('2d');
const vrInfoTex = new THREE.CanvasTexture(vrInfoCanvas);
const vrInfoMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.6, 0.3),
  new THREE.MeshBasicMaterial({ map: vrInfoTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
);
vrInfoMesh.visible = false;
scene.add(vrInfoMesh);

function drawVrPanel(node) {
  const c = vrInfoCtx;
  const W = vrInfoCanvas.width, H = vrInfoCanvas.height;
  c.clearRect(0, 0, W, H);

  // Background
  c.fillStyle = 'rgba(0,0,0,0.88)';
  roundRect(c, 4, 4, W-8, H-8, 12);
  c.fill();
  c.strokeStyle = '#c8a96e44';
  c.lineWidth = 2;
  roundRect(c, 4, 4, W-8, H-8, 12);
  c.stroke();

  // Name
  c.fillStyle = '#c8a96e';
  c.font = 'bold 22px monospace';
  c.fillText(node.name || '—', 20, 40);

  // Region
  c.fillStyle = '#555';
  c.font = '14px monospace';
  c.fillText((node.region || '').toUpperCase(), 20, 62);

  // Desc — word wrap
  c.fillStyle = '#888';
  c.font = '13px monospace';
  const words = (node.desc || '').split(' ');
  let line = '', y = 92;
  words.forEach(w => {
    const test = line + w + ' ';
    if (c.measureText(test).width > W - 40 && line) {
      c.fillText(line, 20, y); line = w + ' '; y += 18;
    } else { line = test; }
    if (y > H - 30) return;
  });
  if (y <= H - 30) c.fillText(line, 20, y);

  // Coords
  if (node.lat !== undefined) {
    c.fillStyle = '#333';
    c.font = '12px monospace';
    c.fillText(`LAT ${node.lat}°  LON ${node.lon}°`, 20, H - 16);
  }

  vrInfoTex.needsUpdate = true;
  vrInfoMesh.visible = true;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// Hook showInfo to also draw VR panel when in VR
const _showInfo = showInfo;
showInfo = function(node, set) {
  _showInfo(node, set);
  if (renderer.xr.isPresenting) drawVrPanel(node);
};

// ═══════════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════════════════
const clk = new THREE.Clock();
const _vrRaycasterDir = new THREE.Vector3();
const _vrOrigin = new THREE.Vector3();

renderer.setAnimationLoop(() => {
  const t = clk.getElapsedTime();
  const inVR = renderer.xr.isPresenting;

  // ── Thumbstick globe rotation (VR only) ──────────────────────────────
  if (inVR) {
    gripSources.forEach((src, hi) => {
      if (!src || !src.gamepad) return;
      const gp = src.gamepad;

      // Right hand: thumbstick axes 2,3 → rotate globe
      if (hi === 1 && gp.axes.length >= 4) {
        const ax = gp.axes[2], ay = gp.axes[3];
        if (Math.abs(ax) > 0.12) rotV.y += ax * 0.04;
        if (Math.abs(ay) > 0.12) rotV.x += ay * 0.04;
      }

      // Left hand: thumbstick axis 3 → zoom (move globe closer/further)
      if (hi === 0 && gp.axes.length >= 4) {
        const ay = gp.axes[3];
        if (Math.abs(ay) > 0.12) {
          const s = G.scale.x;
          const ns = Math.max(0.3, Math.min(1.4, s - ay * 0.02));
          G.scale.setScalar(ns);
        }
      }
    });

    // Position VR info panel — float it to the left of the globe
    if (vrInfoMesh.visible) {
      const gpos = new THREE.Vector3();
      G.getWorldPosition(gpos);
      vrInfoMesh.position.set(gpos.x - 0.7, gpos.y + 0.2, gpos.z);
      // Face the camera (head)
      const head = renderer.xr.getCamera(camera);
      vrInfoMesh.lookAt(head.position);
    }
  }

  // ── Controller laser pointers ─────────────────────────────────────────
  if (inVR) {
    controllers.forEach(({ ctrl, ray, rayMat, cursor, cursorMat }) => {
      ctrl.getWorldPosition(_vrOrigin);
      ctrl.getWorldDirection(_vrRaycasterDir).negate();
      vrRay.set(_vrOrigin, _vrRaycasterDir);

      const hits = vrRay.intersectObjects([...vortexDots, ...secondaryDots, hitSphere], true);
      if (hits.length) {
        const pt = hits[0].point;
        // Shorten ray to hit point
        const local = ctrl.worldToLocal(pt.clone());
        const dist = local.length();
        ray.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-dist)]);
        ray.geometry.needsUpdate = true;
        cursor.position.copy(pt);
        cursor.visible = true;

        // Highlight if over a node
        const isNode = hits[0].object.userData.nodeId !== undefined;
        rayMat.color.setHex(isNode ? 0xc8a96e : 0x80ffcc);
        rayMat.opacity = isNode ? 0.8 : 0.4;
        cursorMat.color.setHex(isNode ? 0xffd080 : 0xc8a96e);
      } else {
        ray.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-8)]);
        ray.geometry.needsUpdate = true;
        cursor.visible = false;
        rayMat.color.setHex(0x80ffcc);
        rayMat.opacity = 0.25;
      }
    });
  }

  // ── Globe rotation (mouse/touch) ──────────────────────────────────────
  if (!inVR) {
    camera.position.z += (targetZ - camera.position.z) * 0.08;
  }

  G.rotation.y += rotV.y; G.rotation.x += rotV.x;
  rotV.x *= 0.91; rotV.y *= 0.91;
  G.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, G.rotation.x));
  if (Math.abs(rotV.y) < 0.0008 && Math.abs(rotV.x) < 0.0008) G.rotation.y += 0.0005;

  // ── Animations ───────────────────────────────────────────────────────
  riftAnim.forEach(r => {
    const p = (Math.sin(t*.5+r.phase)+1)/2;
    r.mat.opacity = p*.72+.04;
    r.mat.color.setHSL(.38+p*.04,.8,.25+p*.25);
  });

  vortexAnim.forEach(n => {
    const p = (Math.sin(t*1.0+n.phase)+1)/2;
    n.pulseMat.opacity = p*.22;
    const s = 1+p*.4; n.pulse.scale.set(s,s,s);
    n.ringMat.opacity = .35+p*.5;
  });

  secondaryAnim.forEach(n => {
    const p = (Math.sin(t*.7+n.phase)+1)/2;
    n.dotMat.opacity = .6+p*.3;
    n.ringMat.opacity = .15+p*.28;
    const s = 1+p*.15; n.dot.scale.set(s,s,s);
  });

  annGrp.children.forEach(c => { if(c.userData.annotation) c.rotation.y = t*.8; });

  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
